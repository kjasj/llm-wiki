site_name: LLM 与 Agent 工程
site_description: 从 Transformer、推理、API、训练部署到 Agent 和上下文工程的学习笔记。
theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
extra_javascript:
  - javascripts/mermaid-render.mjs
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid-source
          class: mermaid-source
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
nav:
  - 首页: index.md
  - 0. 总览:
      - 概念索引: topics/concept-index.md
      - 术语表: topics/llm-inference-terms-glossary.md
      - 全局地图: topics/llm-to-agent-system-overview.md
      - LLM 生命周期: topics/llm-lifecycle.md
  - 1. 模型原理:
      - 数据与 Tokenizer: topics/data-tokenizer-pretraining-data.md
      - 后训练与对齐: topics/post-training-alignment.md
      - Reasoning 模型: topics/reasoning-models-test-time-compute.md
      - Transformer: topics/transformer-beginner.md
      - 推理架构: topics/llm-inference-architecture.md
      - 推理优化案例: topics/hy3-preview-inference-optimization-case.md
  - 2. 应用与部署:
      - API 调用链: topics/openai-api-beginner.md
      - 应用架构: topics/llm-application-architecture.md
      - RAG 工程: topics/rag-engineering-practice.md
      - 模型路由: topics/model-selection-routing.md
      - 训练部署路线: topics/model-training-deployment-roadmap.md
      - Python 训练循环: topics/python-training-loop.md
      - LoRA / QLoRA: topics/lora-qlora-finetuning.md
      - 部署框架: topics/local-deployment-frameworks.md
      - 量化压缩: topics/model-quantization-and-compression.md
      - 硬件选型: topics/model-deployment-hardware-sizing.md
      - 参数调优: topics/parameter-tuning-handbook.md
      - LLMOps: topics/llmops-production.md
  - 3. Agent 工程:
      - Agent 入门: topics/agent-development-beginner.md
      - Agent Runtime: topics/agent-runtime-project-development.md
      - Agent 模式: topics/agent-patterns.md
      - Harness: topics/harness-engineering.md
      - Loop: topics/loop-engineering.md
      - 安全边界: topics/agent-security-guardrails.md
      - Skills: topics/agent-skills-implementation.md
      - MCP 协议: topics/mcp-tool-protocol.md
      - 效果评测: topics/agent-evaluation-framework.md
  - 4. 系统设计:
      - 上下文入门: topics/context-engineering-beginner.md
      - 上下文工程: topics/context-engineering.md
      - Prompt 模板: topics/context-engineering-prompt-templates.md
      - Multi-Agent 与记忆: topics/multi-agent-collaboration-memory.md
      - 大型系统架构: topics/large-agent-system-architecture.md
      - 开源提示词目录: topics/open-source-agent-prompts.md
  - 决策记录: decisions/index.md
